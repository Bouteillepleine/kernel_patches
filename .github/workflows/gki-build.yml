name: 🧩 GKI build-verify BBRv3 patch

# Applies a common/bbrv3/0001-...-<version>.patch onto the *vanilla* Google GKI
# ACK source, forces CONFIG_TCP_CONG_BBR3=y, and builds //common:kernel_aarch64
# to prove the backport compiles against stock GKI (not just vendor trees).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'android<A>-<K> (e.g. android16-6.12)'
        required: true
        default: 'android16-6.12'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/local/lib/android /usr/share/dotnet \
            /usr/local/.ghcup /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get -qq purge -y '^dotnet-.*' '^llvm-.*' azure-cli google-cloud-cli \
            microsoft-edge-stable google-chrome-stable firefox || true
          sudo apt-get -qq autoremove -y; sudo apt-get -qq clean; df -h /

      - name: Install deps
        run: |
          sudo apt-get -qq update
          sudo DEBIAN_FRONTEND=noninteractive apt-get -qq install -y \
            build-essential git curl python3 python3-pip flex bison libssl-dev \
            libelf-dev bc rsync unzip zip ccache lld
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.email ci@ci; git config --global user.name ci
          git config --global color.ui false

      - name: Sync GKI source (${{ inputs.version }})
        run: |
          V="${{ inputs.version }}"
          mkdir gki && cd gki
          repo init --depth=1 -u https://android.googlesource.com/kernel/manifest \
            -b "common-$V" < /dev/null
          repo sync -c -j"$(nproc)" --no-tags --optimized-fetch --prune --force-sync
          test -d common || { echo "::error::common/ missing after sync"; exit 1; }

      - name: Apply BBRv3 patch + enable CONFIG_TCP_CONG_BBR3
        run: |
          V="${{ inputs.version }}"
          cd gki
          RAW="https://raw.githubusercontent.com/Bouteillepleine/kernel_patches/main/common/bbrv3"
          curl -fsSL "$RAW/0001-net-tcp-backport-BBRv3-to-$V.patch" -o /tmp/bbr3.patch
          ( cd common && git apply --index /tmp/bbr3.patch )
          # BBR3 lives inside `if TCP_CONG_ADVANCED` (default n, and NOT set in
          # older gki_defconfigs — 5.10/5.15/6.1). Enable the block AND BBR3 in
          # gki_defconfig, then neuter GKI's defconfig-canonicalization check
          # (two shell-fn variants: check_defconfig for build.sh + older kleaf,
          # kleaf_internal_check_defconfig_minimized for newer kleaf).
          DEF=common/arch/arm64/configs/gki_defconfig
          grep -qx 'CONFIG_TCP_CONG_ADVANCED=y' "$DEF" || echo 'CONFIG_TCP_CONG_ADVANCED=y' >> "$DEF"
          echo 'CONFIG_TCP_CONG_BBR3=y' >> "$DEF"
          for u in $(grep -rlIE 'check_defconfig\(\)|kleaf_internal_check_defconfig_minimized' . 2>/dev/null); do
            perl -0777 -pi -e 's/(\bcheck_defconfig\s*\(\)\s*\{)/$1\n  return 0;/g;
                                s/(\bfunction\s+check_defconfig\s*\{)/$1\n  return 0;/g;
                                s/(\bkleaf_internal_check_defconfig_minimized\s*\(\)\s*\{)/$1\n  return 0;/g;
                                s/(\bfunction\s+kleaf_internal_check_defconfig_minimized\s*\{)/$1\n  return 0;/g' "$u"
          done
          echo "gki_defconfig target lines present: $(grep -cE 'CONFIG_TCP_CONG_(ADVANCED|BBR3)=y' "$DEF")/2"

      - name: Build //common:kernel_aarch64 (or build.sh)
        run: |
          set -o pipefail   # so bazel/build.sh failure isn't masked by | tail
          cd gki
          export CCACHE_DIR="$PWD/.ccache"; mkdir -p "$CCACHE_DIR"
          if [ -x tools/bazel ]; then
            echo "== kleaf build =="
            tools/bazel build //common:kernel_aarch64 2>&1 | tail -500
          else
            echo "== legacy build.sh =="
            LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh 2>&1 | tail -400
          fi

      - name: Locate built Image + confirm tcp_bbr3.o compiled
        run: |
          cd gki
          # -L follows kleaf's bazel-bin symlink tree and build.sh's out/ dirs
          IMG=$(find -L . -name Image -type f 2>/dev/null | head -1)
          # LTO builds leave no standalone tcp_bbr3.o; the .cmd file proves it
          # was compiled. Accept either as evidence.
          BBEV=$(find -L . \( -name 'tcp_bbr3.o' -o -name '.tcp_bbr3.o.cmd' \) 2>/dev/null | head -1)
          PLBEV=$(find -L . \( -name 'tcp_plb.o' -o -name '.tcp_plb.o.cmd' \) 2>/dev/null | head -1)
          echo "Image:              ${IMG:-<none>}  size: $([ -n "$IMG" ] && stat -c%s "$IMG" || echo 0)"
          echo "tcp_bbr3 compiled:  ${BBEV:-<none>}"
          echo "tcp_plb  compiled:  ${PLBEV:-<none>}"
          [ -n "$IMG" ] || { echo "::error::no Image built"; exit 1; }
          [ -n "$BBEV" ] && echo "✅ GKI build SUCCEEDED, BBRv3 (tcp_bbr3) compiled in for ${{ inputs.version }}" \
                         || echo "::warning::Image built but no tcp_bbr3 evidence found (BBR3 may not be enabled)"
